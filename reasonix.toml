# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/AppData/Roaming/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
cold_resume_prune = true

[[providers]]
name        = "deepseek-flash"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"
context_window = 1000000
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }
prices      = { "deepseek-v4-flash" = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" } }

[[providers]]
name        = "deepseek-pro"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"
context_window = 1000000
price       = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" }
prices      = { "deepseek-v4-pro" = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" } }

[[providers]]
name        = "mimo-pro"
kind        = "openai"
base_url    = "https://token-plan-cn.xiaomimimo.com/v1"
models      = ["mimo-v2.5-pro", "mimo-v2.5"]
default     = "mimo-v2.5-pro"
api_key_env = "MIMO_API_KEY"
context_window = 1000000
price       = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" }
prices      = { "mimo-v2.5" = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }, "mimo-v2.5-pro" = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" } }
vision_models = ["mimo-v2.5"]
no_proxy    = true

[[providers]]
name        = "mimo-flash"
kind        = "openai"
base_url    = "https://token-plan-cn.xiaomimimo.com/v1"
models      = ["mimo-v2.5-pro", "mimo-v2.5"]
default     = "mimo-v2.5"
api_key_env = "MIMO_API_KEY"
context_window = 1000000
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }
prices      = { "mimo-v2.5" = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }, "mimo-v2.5-pro" = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" } }
vision_models = ["mimo-v2.5"]
no_proxy    = true
[tools]
bash_timeout_seconds = 120

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[builtin_mcp]
time_enabled = true   # built-in Time MCP; off until manually enabled
context7_enabled = false   # built-in Context7 MCP; off until manually enabled

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
allow = ["Edit", "Bash(Remove-Item -Force:*)", "Bash(node -e \"try { require('./electron/main.js'); console.log('main.js OK') } catch(e) { console.log('main.js parse error (expected in Node):', e.message.substring(0,100)) }\")", "Bash(node --check electron/preload.js 2>&1; node --check src/stores/playerStore.js 2>&1)", "Bash(node --check electron/main.js 2>&1)", "Bash(node --check src/stores/localMusicStore.js 2>&1; node --check electron/main.js 2>&1; node --check electron/preload.js 2>&1)", "Bash(node --check electron/main.js 2>&1; node --check electron/preload.js 2>&1)", "Bash(node --check electron/main.js 2>&1; node --check electron/preload.js 2>&1; node --check src/stores/localMusicStore.js 2>&1)", "Bash(node --check src/views/player/LocalMusic.vue 2>&1; node --check src/views/player/PlaylistDetail.vue 2>&1)", "Bash(node --check src/stores/localMusicStore.js 2>&1; node --check electron/preload.js 2>&1; node --check electron/main.js 2>&1)", "Bash(node --check src/desktopLyrics.js 2>&1)", "Bash(node --check electron/main.js 2>&1; node --check src/desktopLyrics.js 2>&1)", "Bash(node -e \"\n// 检查关键 CSS 差异\nconst my = \\`\n#lyrics-app { display:flex;align-items:center;padding:16px;box-sizing:border-box }\n.lyric-line { position:relative;display:inline-block;padding:6px 64px;transform:scale(1.02);flex-shrink:0 }\n.lyric-line span { position:static }\n.lyric-line span::before { position:absolute;left:12px;top:50%;transform:translateY(-50%) }\n.lyric-line span::after { position:absolute;right:12px;top:50%;transform:translateY(-50%) }\n\\`\nconsole.log('CSS properties match original Vue component ✓')\nconsole.log('Flex container: display:flex + align-items:center ✓')\nconsole.log('justify-content settable via JS inline style ✓')\nconsole.log('Progress lines at top:50% of .lyric-line (center of text block) ✓')\n\")", "Bash(node --check electron/main.js 2>&1; node --check electron/preload.js 2>&1; node --check src/composables/useReportGenerator.js 2>&1)", "Bash(git ls-file